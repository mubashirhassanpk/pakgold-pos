<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PakGold POS — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b1120;
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 420px; }
      h1 { color: #d4af37; margin-bottom: 8px; }
      p { color: rgba(255, 255, 255, 0.7); line-height: 1.6; }
      button {
        margin-top: 20px;
        background: #d4af37;
        color: #0b1120;
        border: 0;
        border-radius: 10px;
        padding: 12px 24px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        PakGold POS needs the shop server running to load this page. If the server is on,
        check your connection and try again.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
